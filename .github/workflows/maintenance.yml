name: Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  stale-cache-cleanup:
    name: Delete stale caches
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
              (response) => response.data.actions_caches ?? [],
            );

            const threeDaysAgo = new Date();
            threeDaysAgo.setDate(threeDaysAgo.getDate() - 3);

            for (const cache of caches) {
              const lastUsed = new Date(cache.last_accessed_at);
              if (lastUsed < threeDaysAgo) {
                console.log(`Deleting cache: ${cache.key} (last used: ${cache.last_accessed_at})`);
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                });
              }
            }

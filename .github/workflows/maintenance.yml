name: Maintenance

on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  stale-cache-cleanup:
    name: Delete stale caches
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const cachesResponse = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const threeDaysAgo = new Date();
            threeDaysAgo.setDate(threeDaysAgo.getDate() - 3);

            for (const cache of cachesResponse.data.actions_caches) {
              const lastUsed = new Date(cache.last_accessed_at);
              if (lastUsed < threeDaysAgo) {
                console.log(`Deleting cache: ${cache.key} (last used: ${cache.last_accessed_at})`);
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                });
              }
            }
